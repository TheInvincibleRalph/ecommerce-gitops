apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-config-employee
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/TheInvincibleRalph/ecommerce-gitops.git'
    targetRevision: HEAD
    path: apps/karpenter-config
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true