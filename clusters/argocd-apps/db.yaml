apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: database-employee
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/TheInvincibleRalph/ecommerce-gitops.git'
    targetRevision: HEAD
    path: apps/database
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: database-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true