apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/TheInvincibleRalph/ecommerce-gitops.git'
    targetRevision: HEAD
    path: apps/core
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true